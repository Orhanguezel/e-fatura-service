<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>e-fatura Admin</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f1419;
        --card: #1a2332;
        --text: #e7ecf3;
        --muted: #8b9cb3;
        --accent: #3b82f6;
        --danger: #ef4444;
        --ok: #22c55e;
        --border: #2d3a4f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }
      header {
        padding: 1.25rem 1.5rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        align-items: center;
        justify-content: space-between;
      }
      h1 { margin: 0; font-size: 1.25rem; font-weight: 600; }
      main { padding: 1.5rem; max-width: 1200px; margin: 0 auto; }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-bottom: 1rem;
        align-items: end;
      }
      label { display: flex; flex-direction: column; gap: 0.25rem; font-size: 0.8rem; color: var(--muted); }
      input, select, button {
        font: inherit;
        padding: 0.5rem 0.75rem;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--text);
      }
      button {
        cursor: pointer;
        background: var(--accent);
        border-color: transparent;
        font-weight: 500;
      }
      button.secondary { background: transparent; border-color: var(--border); }
      button.danger { background: var(--danger); }
      table {
        width: 100%;
        border-collapse: collapse;
        background: var(--card);
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid var(--border);
      }
      th, td {
        padding: 0.75rem 1rem;
        text-align: left;
        border-bottom: 1px solid var(--border);
        font-size: 0.875rem;
      }
      th { color: var(--muted); font-weight: 500; }
      tr:last-child td { border-bottom: none; }
      .badge {
        display: inline-block;
        padding: 0.15rem 0.5rem;
        border-radius: 999px;
        font-size: 0.75rem;
        background: #243044;
      }
      .badge.failed { color: #fca5a5; }
      .badge.approved { color: #86efac; }
      .badge.pending { color: #fde68a; }
      #status { margin-top: 1rem; color: var(--muted); font-size: 0.875rem; }
      .actions { display: flex; gap: 0.5rem; }
    </style>
  </head>
  <body>
    <header>
      <h1>e-fatura-service — Operasyon</h1>
      <span style="color: var(--muted); font-size: 0.875rem">Faz 4 admin</span>
    </header>
    <main>
      <div class="toolbar">
        <label>
          Admin token
          <input id="token" type="password" placeholder="EFATURA_ADMIN_TOKEN" style="min-width: 220px" />
        </label>
        <label>
          Durum
          <select id="filterStatus">
            <option value="">Tümü</option>
            <option value="pending">pending</option>
            <option value="failed">failed</option>
            <option value="approved">approved</option>
            <option value="sent">sent</option>
            <option value="cancelled">cancelled</option>
            <option value="refunded">refunded</option>
          </select>
        </label>
        <label>
          Tenant
          <input id="filterTenant" placeholder="sportoonline" />
        </label>
        <button type="button" id="loadBtn">Yükle</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Tenant</th>
            <th>Idempotency</th>
            <th>Durum</th>
            <th>ETTN</th>
            <th>Deneme</th>
            <th>İşlem</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      <p id="status"></p>
    </main>
    <script>
      const apiBase = window.location.origin;

      function headers() {
        const token = document.getElementById("token").value.trim();
        if (!token) throw new Error("Admin token girin");
        return { "X-Admin-Token": token };
      }

      function badge(status) {
        return `<span class="badge ${status}">${status}</span>`;
      }

      async function load() {
        const status = document.getElementById("status");
        const filterStatus = document.getElementById("filterStatus").value;
        const tenantKey = document.getElementById("filterTenant").value.trim();
        const params = new URLSearchParams({ page: "1", limit: "50" });
        if (filterStatus) params.set("status", filterStatus);
        if (tenantKey) params.set("tenant_key", tenantKey);

        status.textContent = "Yükleniyor…";
        const res = await fetch(`${apiBase}/v1/admin/invoices?${params}`, {
          headers: headers()
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data?.error?.message ?? res.statusText);

        const tbody = document.getElementById("rows");
        tbody.innerHTML = data.items
          .map(
            (row) => `
          <tr>
            <td>${row.id}</td>
            <td>${row.tenant_key}</td>
            <td title="${row.idempotency_key}">${row.idempotency_key.slice(0, 20)}…</td>
            <td>${badge(row.status)}</td>
            <td>${row.ettn ?? "—"}</td>
            <td>${row.attempts}</td>
            <td class="actions">
              ${
                row.status === "failed"
                  ? `<button class="danger" data-retry="${row.id}">Tekrar gönder</button>`
                  : ""
              }
              <button class="secondary" data-events="${row.id}">Olaylar</button>
            </td>
          </tr>`
          )
          .join("");

        status.textContent = `${data.total} kayıt (sayfa ${data.page})`;
      }

      document.getElementById("loadBtn").addEventListener("click", () => {
        load().catch((e) => {
          document.getElementById("status").textContent = e.message;
        });
      });

      document.getElementById("rows").addEventListener("click", async (e) => {
        const target = e.target;
        if (!(target instanceof HTMLElement)) return;

        const retryId = target.dataset.retry;
        const eventsId = target.dataset.events;

        try {
          if (retryId) {
            const res = await fetch(`${apiBase}/v1/admin/invoices/${retryId}/retry`, {
              method: "POST",
              headers: headers()
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data?.error?.message ?? res.statusText);
            alert(`Kuyruğa alındı: #${data.invoice_id}`);
            await load();
          }
          if (eventsId) {
            const res = await fetch(`${apiBase}/v1/admin/invoices/${eventsId}/events`, {
              headers: headers()
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data?.error?.message ?? res.statusText);
            alert(
              data.events
                .map((ev) => `${ev.created_at} ${ev.from_status ?? "—"} → ${ev.to_status} (${ev.actor})`)
                .join("\n")
            );
          }
        } catch (err) {
          alert(err instanceof Error ? err.message : "Hata");
        }
      });
    </script>
  </body>
</html>
