# e-fatura-service — prod stack (scraper-service deseni: api+redis+mysql)
# orhan docker grubunda → sudo gerektirmez. Nginx/TLS ayrı (deploy/README.md).
services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: efatura_service
      MYSQL_USER: efatura
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set in .env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set in .env}
    volumes:
      - efatura-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - efatura-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]

  api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "8210"
      WORKER_ENABLED: "true"
      DATABASE_URL: mysql://efatura:${MYSQL_PASSWORD}@mysql:3306/efatura_service
      REDIS_URL: redis://redis:6379
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports:
      # Yalnız localhost → Nginx upstream (nginx/efatura.conf 127.0.0.1:8210)
      - "127.0.0.1:8210:8210"
    networks: [internal]

volumes:
  efatura-mysql:
  efatura-redis:

networks:
  internal:
    driver: bridge
