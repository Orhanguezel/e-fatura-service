# e-fatura-service — Nginx reverse proxy + admin Basic Auth
# Desen: scraper-service/nginx/scraper.conf
#
# Alt domain / sertifika kullanıcı tarafından yönetilir (server_name + certbot).
# Bu config: API public, ADMIN (panel HTML + /v1/admin API) HTTP Basic Auth arkasında.
#
# Kurulum: nginx/README.md

# --- HTTP → HTTPS yönlendirme + ACME ---
server {
    listen 80;
    server_name efatura.guezelwebdesign.com;   # gerekirse değiştir

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS ---
server {
    listen 443 ssl http2;
    server_name efatura.guezelwebdesign.com;    # gerekirse değiştir

    ssl_certificate     /etc/letsencrypt/live/efatura.guezelwebdesign.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/efatura.guezelwebdesign.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 4m;
    proxy_read_timeout 180s;
    proxy_connect_timeout 15s;
    proxy_send_timeout 180s;

    # Liveness — auth YOK (PM2/Nginx/uptime kontrolü, ARCHITECTURE §"healthz")
    location = /healthz {
        proxy_pass http://127.0.0.1:8210;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        access_log off;
    }

    # ADMIN PANEL (statik HTML) — Basic Auth ZORUNLU
    # Panelin kendisi public olmamalı; uygulama-katmanı X-Admin-Token'a ek savunma.
    location /admin {
        auth_basic           "e-fatura admin";
        auth_basic_user_file /etc/nginx/efatura/.htpasswd;

        alias /var/www/e-fatura-service/admin/;
        try_files $uri $uri/ /admin/index.html;
        index index.html;
    }

    # ADMIN API — Basic Auth ZORUNLU (panelden çağrılır; defense-in-depth)
    location /v1/admin/ {
        auth_basic           "e-fatura admin";
        auth_basic_user_file /etc/nginx/efatura/.htpasswd;

        proxy_pass http://127.0.0.1:8210;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # Basic Auth + uygulamanın X-Admin-Token başlığı birlikte çalışır.
    }

    # Tenant API (servis↔servis, X-Api-Key ile korunur) — Basic Auth YOK
    location / {
        proxy_pass http://127.0.0.1:8210;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
