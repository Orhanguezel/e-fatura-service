# e-fatura-service — Nginx reverse proxy + admin Basic Auth
# Desen: scraper-service/nginx/scraper.conf
#
# Alt domain / sertifika kullanıcı tarafından yönetilir (server_name + certbot).
# Bu config: API public, ADMIN (panel HTML + /v1/admin API) HTTP Basic Auth arkasında.
#
# Kurulum: nginx/README.md

# --- HTTP → HTTPS yönlendirme + ACME ---
server {
    listen 80;
    server_name efatura.guezelwebdesign.com;   # gerekirse değiştir

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS ---
server {
    listen 443 ssl http2;
    server_name efatura.guezelwebdesign.com;    # gerekirse değiştir

    ssl_certificate     /etc/letsencrypt/live/efatura.guezelwebdesign.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/efatura.guezelwebdesign.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 4m;
    proxy_read_timeout 180s;
    proxy_connect_timeout 15s;
    proxy_send_timeout 180s;

    # Kök: API'de GET / yok (404 JSON döner). İnsan ziyaretçiyi panele yönlendir.
    location = / {
        return 302 /admin/;
    }
    # Tarayıcı otomatik favicon isteği — gürültüyü sustur (API'de yok).
    location = /favicon.ico {
        return 204;
        access_log off;
    }

    # Liveness — auth YOK (PM2/Nginx/uptime kontrolü, ARCHITECTURE §"healthz")
    location = /healthz {
        proxy_pass http://127.0.0.1:8210;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        access_log off;
    }

    # ADMIN PANEL (statik HTML) — Nginx auth YOK (kullanıcı kararı)
    # Panel salt kabuk; tüm admin işlemleri /v1/admin'de X-Admin-Token ile
    # uygulama katmanında kapalı. Token olmadan panel veri göstermez.
    location /admin {
        alias /var/www/e-fatura-service/admin/;
        try_files $uri $uri/ /admin/index.html;
        index index.html;
    }

    # ADMIN API — uygulama X-Admin-Token ile korunur (Nginx auth yok)
    location /v1/admin/ {
        proxy_pass http://127.0.0.1:8210;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Tenant API (servis↔servis, X-Api-Key ile korunur) — Basic Auth YOK
    location / {
        proxy_pass http://127.0.0.1:8210;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
